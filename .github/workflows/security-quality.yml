name: Security & Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run security checks daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies - Shared
        working-directory: shared
        run: npm ci

      - name: Install dependencies - Frontend
        working-directory: frontend
        run: npm ci

      - name: Install dependencies - Bot
        working-directory: bot
        run: npm ci

      - name: Run npm audit - Shared
        working-directory: shared
        continue-on-error: true
        run: npm audit --json > shared-audit.json || true

      - name: Run npm audit - Frontend
        working-directory: frontend
        continue-on-error: true
        run: npm audit --json > frontend-audit.json || true

      - name: Run npm audit - Bot
        working-directory: bot
        continue-on-error: true
        run: npm audit --json > bot-audit.json || true

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            shared/package-lock.json
            frontend/package-lock.json
            bot/package-lock.json

      - name: Install dependencies - Shared
        working-directory: shared
        run: npm ci

      - name: Install dependencies - Frontend
        working-directory: frontend
        run: npm ci

      - name: Install dependencies - Bot
        working-directory: bot
        run: npm ci

      - name: Type check - Shared
        working-directory: shared
        run: npx tsc --noEmit

      - name: Type check - Frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Type check - Bot
        working-directory: bot
        run: npx tsc --noEmit

  format-check:
    name: Format & Style Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint -- --max-warnings=5 2>&1 || echo "Linting issues found (review required)"

  dependency-updates:
    name: Check Dependency Updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            shared/package-lock.json
            frontend/package-lock.json
            bot/package-lock.json

      - name: Check for outdated dependencies
        run: |
          echo "=== Checking Shared Dependencies ==="
          cd shared && npm outdated || true
          cd $GITHUB_WORKSPACE
          echo ""
          echo "=== Checking Frontend Dependencies ==="
          cd frontend && npm outdated || true
          cd $GITHUB_WORKSPACE
          echo ""
          echo "=== Checking Bot Dependencies ==="
          cd bot && npm outdated || true
