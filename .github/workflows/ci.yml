name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'bot/**'
      - 'shared/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'bot/**'
      - 'shared/**'
      - '.github/workflows/ci.yml'

jobs:
  frontend:
    name: Frontend (Lint, Test, Build)
    runs-on: ubuntu-latest
    
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Note: GROQ_API_KEY should only be used at runtime, not during build
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            shared/package-lock.json
            frontend/package-lock.json

      - name: Install Shared Dependencies
        working-directory: ./shared
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Test Frontend
        working-directory: ./frontend
        run: npm run test

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  bot:
    name: Bot (Test, Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            shared/package-lock.json
            bot/package-lock.json

      - name: Install Shared Dependencies
        working-directory: ./shared
        run: npm ci

      - name: Install Bot Dependencies
        working-directory: ./bot
        run: npm ci

      - name: Test Bot
        working-directory: ./bot
        run: npm test

      - name: Build Bot
        working-directory: ./bot
        run: npm run build
