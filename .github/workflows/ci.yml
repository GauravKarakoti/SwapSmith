name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend (Lint, Test, Build)
    runs-on: ubuntu-latest
    
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} # Optional if needed for build
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Shared Dependencies
        working-directory: ./shared
        run: npm install

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Test Frontend
        working-directory: ./frontend
        run: npm run test

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  bot:
    name: Bot (Test, Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Shared Dependencies
        working-directory: ./shared
        run: npm install

      - name: Install Bot Dependencies
        working-directory: ./bot
        run: npm ci

      - name: Test Bot
        working-directory: ./bot
        run: npm test

      - name: Build Bot
        working-directory: ./bot
        run: npm run build
